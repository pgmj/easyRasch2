url: https://pgmj.github.io/easyRasch2/

development:
  mode: auto

template:
  bootstrap: 5
  bootswatch: lumen
  math-rendering: katex

navbar:
  structure:
    left:  [intro, reference, news]
    right: [search, github, lightswitch]
  components:
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: Changelog
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/pgmj/easyRasch2/
      aria-label: GitHub

reference:
  - title: "Item Fit"
    desc: "Conditional item fit statistics with simulation-based cutoffs"
    contents:
      - RMitemInfit
      - RMitemInfitCutoff
      - RMitemInfitCutoffPlot
      - RMitemInfitMI
      - RMitemInfitCutoffMI
      - RMitemICCPlot
      - RMitemCatProb
  - title: "Item Restscore"
    desc: "Item-restscore correlation analysis"
    contents:
      - RMitemRestscore
      - RMitemRestscoreBoot
  - title: "Local Dependence (LD)"
    desc: "Q3 residual correlations & partial gammal LD with simulation-based cutoffs"
    contents:
      - RMlocdepQ3
      - RMlocdepQ3Cutoff
      - RMlocdepQ3Plot
      - RMlocdepGamma
      - RMlocdepGammaCutoff
      - RMlocdepGammaPlot
  - title: "Differential Item Functioning (DIF)"
    desc: "DIF assessment functions"
    contents:
      - RMdifLR
      - RMdifTree
      - RMdifGamma
      - RMdifGammaCutoff
      - RMdifGammaPlot
  - title: "Global tests of model fit"
    desc: "PCA of residuals, and more to come"
    contents:
      - RMdimCFACutoff
      - RMdimCFAPlot
      - RMdimResidualPCA
      - RMdimResidualPCACutoff
      - RMdimMartinLof
      - RMdimMartinLofResiduals
  - title: "Descriptive functions"
    desc: "Targeting and other plots/tables"
    contents:
      - RMplotTile
      - RMplotStackedbar
      - RMplotBar
      - RMtargeting
      - RMitemHierarchy
      - RMscoreSE
      - RMreliability
      - RMUreliability
  - title: "Datasets"
    desc: "Package builtin data"
    contents:
      - phq9
