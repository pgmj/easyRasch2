url: https://pgmj.github.io/easyRasch2/

development:
  mode: auto

template:
  bootstrap: 5
  bootswatch: lumen

navbar:
  structure:
    left:  [intro, reference, news]
    right: [search, github, lightswitch]
  components:
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: Changelog
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/pgmj/easyRasch2/
      aria-label: GitHub

reference:
  - title: "Item Fit"
    desc: "Conditional item fit statistics with simulation-based cutoffs"
    contents:
      - RMiteminfit
      - RMinfitcutoff
      - RMinfitcutoffPlot
      - RMiteminfit_mi
      - RMinfitcutoff_mi
  - title: "Item Restscore"
    desc: "Item-restscore correlation analysis"
    contents:
      - RMitemrestscore
      - RMbootRestscore
  - title: "Local Dependence (LD)"
    desc: "Q3 residual correlations & partial gammal LD with simulation-based cutoffs"
    contents:
      - RMlocdepQ3
      - RMlocdepQ3cutoff
      - RMpartgamLD
      - RMpgLDcutoff
      - RMpgLDplot
  - title: "Differential Item Functioning (DIF)"
    desc: "Partial gamma based DIF with simulation-based cutoffs"
    contents:
      - RMdifLR
      - RMdifTree
      - RMpartgamDIF
      - RMpgDIFcutoff
      - RMpgDIFplot
  - title: "Global tests of model fit"
    desc: "PCA of residuals, and more to come"
    contents:
      - RMresidualPCA
      - RMpcaCutoff
      - RMmartinLof
      - RMmartinLofResiduals
  - title: "Descriptive functions"
    desc: "Targeting and other plots/tables"
    contents:
      - RMtileplot
      - RMtargeting
      - RMscoreSE
      - RMreliability
      - RMUreliability
